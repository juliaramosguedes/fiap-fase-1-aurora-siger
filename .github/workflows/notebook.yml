name: Validate Notebook

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Execute notebook
        run: jupyter nbconvert --to notebook --execute --inplace aurora_siger_report.ipynb

      - name: Clear outputs
        run: jupyter nbconvert --clear-output --inplace aurora_siger_report.ipynb
